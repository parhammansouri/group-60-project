name: Java Smoke Test

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Run smoke test
        shell: pwsh
        run: ./scripts/smoke-test.ps1
